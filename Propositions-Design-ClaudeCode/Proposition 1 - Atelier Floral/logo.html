<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
*{margin:0;box-sizing:border-box}
html,body{width:1200px;height:520px}
body{
  display:flex;align-items:center;justify-content:center;gap:42px;
  background:radial-gradient(900px 460px at 70% 0%, #FCF8F0, #F4EFE5);
  font-family:"Inter",sans-serif;
}
.mark{width:172px;height:172px;flex-shrink:0}
.word{display:flex;flex-direction:column;gap:14px}
.title{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:82px;
  line-height:.92;color:#2C2823;letter-spacing:.5px}
.title em{font-style:italic;color:#5C6B57}
.rule{display:flex;align-items:center;gap:14px;color:#9A8F7E}
.rule::before,.rule::after{content:"";height:1px;flex:1;background:#DCC9A0}
.tag{font-size:14px;font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:#6F665A;white-space:nowrap}
</style></head>
<body>
  <svg class="mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <circle cx="20" cy="20" r="15" fill="none" stroke="#5C6B57" stroke-width="1.4"/>
    <circle cx="20" cy="20" r="18.4" fill="none" stroke="#DCC9A0" stroke-width="0.7"/>
    <path d="M20 7.5 C 21.8 14, 21.8 26, 20 32.5" fill="none" stroke="#5C6B57" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M20 13.5 C 23 12.4, 25.6 12.6, 27.4 10.6 C 24.2 10.2, 21.4 11, 20 13.5 Z" fill="#8DA17C"/>
    <path d="M20 20 C 17 18.9, 14.4 19.1, 12.6 17.1 C 15.8 16.7, 18.6 17.5, 20 20 Z" fill="#8DA17C"/>
    <path d="M20 26.5 C 23 25.4, 25.6 25.6, 27.4 23.6 C 24.2 23.2, 21.4 24, 20 26.5 Z" fill="#A7B898"/>
    <circle cx="20" cy="20" r="1.7" fill="#B8923C"/>
  </svg>
  <div class="word">
    <div class="title">Plan du <em>Mariage</em></div>
    <div class="rule"><span class="tag">Atelier Floral</span></div>
  </div>
</body></html>
