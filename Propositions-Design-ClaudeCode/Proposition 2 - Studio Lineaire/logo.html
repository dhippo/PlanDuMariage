<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;box-sizing:border-box}
html,body{width:1200px;height:520px}
body{display:flex;align-items:center;justify-content:center;gap:34px;
  background:#FFFFFF;font-family:"Inter",sans-serif}
.tile{width:128px;height:128px;flex-shrink:0;border-radius:30px;
  background:#5B5BD6;display:flex;align-items:center;justify-content:center;
  box-shadow:0 18px 40px rgba(91,91,214,.32)}
.tile svg{width:78px;height:78px}
.word{display:flex;flex-direction:column;gap:9px}
.title{font-size:60px;font-weight:600;letter-spacing:-.025em;color:#16181D;line-height:1}
.title b{color:#5B5BD6;font-weight:600}
.tag{font-size:15px;font-weight:500;letter-spacing:.02em;color:#8A93A3;display:flex;align-items:center;gap:9px}
.dot{width:6px;height:6px;border-radius:50%;background:#5B5BD6}
</style></head>
<body>
  <div class="tile">
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="7" fill="none" stroke="#fff" stroke-width="2.2"/>
      <circle cx="20" cy="9.4" r="1.8" fill="#fff"/><circle cx="20" cy="30.6" r="1.8" fill="#fff"/>
      <circle cx="9.4" cy="20" r="1.8" fill="#fff"/><circle cx="30.6" cy="20" r="1.8" fill="#fff"/>
    </svg>
  </div>
  <div class="word">
    <div class="title">Plan du <b>Mariage</b></div>
    <div class="tag"><span class="dot"></span> STUDIO · ÉDITEUR DE PLAN DE TABLES</div>
  </div>
</body></html>
